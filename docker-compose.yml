services:
  postgres:
    image: postgres:15
    container_name: postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: minio
    env_file: .env
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do sleep 2; done &&
      mc mb --ignore-existing local/lakehouse"

  trino:
    image: trinodb/trino:482
    container_name: trino
    ports:
      - "8081:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog
    depends_on:
      postgres:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      nessie:
        condition: service_started

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qg'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  airflow:
    build: ./airflow
    container_name: airflow
    ports:
      - "8080:8080"
    command: >
      bash -c "rm -f /opt/airflow/airflow-webserver.pid; airflow standalone"
    env_file: .env
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SUPERSET_URL: http://superset:8088
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_data:/opt/airflow
    depends_on:
      minio-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    restart: unless-stopped

  nessie:
    image: ghcr.io/projectnessie/nessie:0.104.5
    container_name: nessie
    ports:
      - "19120:19120"
    environment:
      QUARKUS_HTTP_PORT: 19120

  superset-init:
    build: ./superset
    image: retail-superset:local
    container_name: superset-init
    user: "0"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-retail-lakehouse-change-this-secret-key}
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@lakehouse.local}
    volumes:
      - superset_home:/app/superset_home
    command: >
      /bin/sh -c "superset db upgrade &&
      (superset fab create-admin --username $$SUPERSET_ADMIN_USERNAME --firstname Superset --lastname Admin --email $$SUPERSET_ADMIN_EMAIL --password $$SUPERSET_ADMIN_PASSWORD || true) &&
      superset init"

  superset:
    build: ./superset
    image: retail-superset:local
    container_name: superset
    user: "0"
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-retail-lakehouse-change-this-secret-key}
    volumes:
      - superset_home:/app/superset_home
    depends_on:
      superset-init:
        condition: service_completed_successfully
      trino:
        condition: service_started
    command: superset run -h 0.0.0.0 -p 8088
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  kafka_data:
  airflow_data:
  superset_home:
